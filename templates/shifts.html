{% extends "base.html" %}

{% block title %}Quản Lý Ca Làm Việc{% endblock %}
{% block page_title %}Cấu Hình Ca Làm Việc{% endblock %}

{% block content %}
<div class="grid-container">
    <div class="card">
        <h3>+ Thêm Ca Mới</h3>
        <form id="shiftForm">
            <div class="form-group">
                <label>Mã Ca (VD: CA_SANG)*</label>
                <input type="text" id="shift_code" required autocomplete="off">
            </div>
            <div class="form-group">
                <label>Giờ Bắt Đầu*</label>
                <input type="time" id="start_time" required>
            </div>
            <div class="form-group">
                <label>Giờ Kết Thúc*</label>
                <input type="time" id="end_time" required>
            </div>
            <button type="submit" class="btn-primary">LƯU CA LÀM VIỆC</button>
        </form>
    </div>

    <div class="card" style="overflow-x: auto;">
        <h3>Danh Sách Ca</h3>
        <table>
            <thead>
                <tr>
                    <th>MÃ CA</th>
                    <th>BẮT ĐẦU</th>
                    <th>KẾT THÚC</th>
                </tr>
            </thead>
            <tbody id="shiftTableBody">
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
    const API_URL = "/api/shifts";

    async function fetchShifts() {
        try {
            const res = await fetch(API_URL);
            const data = await res.json();
            const tbody = document.getElementById('shiftTableBody');
            tbody.innerHTML = '';
            data.forEach(shift => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${shift.shift_code}</strong></td>
                        <td><span style="background: var(--bg-body); padding: 5px 10px; border-radius: 5px; font-weight: bold;">${shift.start_time}</span></td>
                        <td><span style="background: var(--bg-body); padding: 5px 10px; border-radius: 5px; font-weight: bold;">${shift.end_time}</span></td>
                    </tr>
                `;
            });
        } catch (err) { console.error(err); }
    }

    document.getElementById('shiftForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const start = document.getElementById('start_time').value + ":00";
        const end = document.getElementById('end_time').value + ":00";

        const payload = {
            shift_code: document.getElementById('shift_code').value.trim().toUpperCase(),
            start_time: start,
            end_time: end
        };

        try {
            const res = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });
            if (res.ok) {
                alert("Thêm ca thành công!");
                document.getElementById('shiftForm').reset();
                fetchShifts();
            } else {
                const result = await res.json();
                alert("Lỗi: " + result.detail);
            }
        } catch (err) { alert("Lỗi kết nối Server"); }
    });

    fetchShifts();
</script>
{% endblock %}
