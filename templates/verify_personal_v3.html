<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chấm Công Cá Nhân - BND Hybrid AI</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection"></script>
    <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #00f2ff; --success: #00ff88; --warning: #ffb800; --error: #ff4444; --server: #f472b6;
            --bg: #0f172a; --card: #1e293b;
        }

        body { 
            font-family: 'Roboto', sans-serif; background: var(--bg); color: #f8fafc; 
            margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center;
            height: 100dvh; box-sizing: border-box; overflow: hidden;
        }

        .btn-back { position: absolute; top: 15px; left: 15px; background: rgba(255,255,255,0.1); color: #cbd5e1; text-decoration: none; padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; z-index: 50; border: 1px solid rgba(255,255,255,0.05); }
        .user-badge { display: inline-flex; background: rgba(0, 242, 255, 0.1); border: 1px solid rgba(0, 242, 255, 0.3); padding: 8px 15px; border-radius: 20px; font-size: 0.9rem; align-items: center; gap: 8px; margin-bottom: 10px; }
        .user-badge strong { color: var(--primary); font-size: 1.05rem; letter-spacing: 1px;}

        header { width: 100%; max-width: 500px; text-align: center; margin-bottom: 10px; flex-shrink: 0; margin-top: 35px;}
        h2 { font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--primary); margin: 0 0 10px 0; }

        .live-clock {
            font-family: 'Orbitron', monospace; font-size: 2rem; font-weight: 700; color: #fff;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 5px 20px; border-radius: 12px; margin-bottom: 10px; display: inline-block;
        }

        /* Badge hiển thị trạng thái Local hay Server */
        .mode-badge { font-size: 0.75rem; padding: 4px 10px; border-radius: 10px; font-weight: bold; text-transform: uppercase; margin-bottom: 5px; display: inline-block; }
        .mode-local { background: rgba(0, 242, 255, 0.1); color: var(--primary); border: 1px solid var(--primary); }
        .mode-server { background: rgba(244, 114, 182, 0.1); color: var(--server); border: 1px solid var(--server); animation: pulsePink 2s infinite; }
        @keyframes pulsePink { 0% {box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.4);} 70% {box-shadow: 0 0 0 10px rgba(244, 114, 182, 0);} 100% {box-shadow: 0 0 0 0 rgba(244, 114, 182, 0);} }

        #networkBanner, #locationBanner { width: 100%; padding: 8px; margin-bottom: 8px; border-radius: 8px; font-size: 0.8rem; font-weight: bold; text-align: center; box-sizing: border-box; }
        .net-valid { background: rgba(0, 255, 136, 0.15); color: var(--success); border: 1px solid rgba(0, 255, 136, 0.4); }
        .net-invalid { background: rgba(255, 68, 68, 0.15); color: var(--error); border: 1px solid rgba(255, 68, 68, 0.4); }

        .info { margin-top: 5px; font-family: 'Orbitron', sans-serif; font-size: 0.9rem; padding: 12px; border-radius: 12px; background: var(--card); border: 1px solid rgba(255,255,255,0.1); display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: bold; box-sizing: border-box;}
        .status-scanning { color: var(--primary); border-color: var(--primary); }
        .status-ok { color: var(--success); border-color: var(--success); background: rgba(0, 255, 136, 0.1); }
        .status-warning { color: var(--warning); border-color: var(--warning); }
        .status-err { color: var(--error); border-color: var(--error); }
        .loader { width: 16px; height: 16px; border: 3px solid rgba(255,255,255,0.2); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .main-wrapper { position: relative; width: 100%; max-width: 400px; flex: 1; background: #000; border-radius: 15px; overflow: hidden; border: 2px solid #334155; margin-top: 5px;}
        #webcam { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .guide-overlay { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; border: 2px dashed rgba(255,255,255,0.3); border-radius: 50% / 45%; width: 220px; height: 300px; z-index: 5; }
        .guide-active { border-color: var(--success); box-shadow: 0 0 25px rgba(0, 255, 136, 0.4); border-style: solid; }
    </style>
</head>
<body>

    <a href="/dashboard" class="btn-back">⬅ Đóng</a>

    <header>
        <h2>CHẤM CÔNG CÁ NHÂN</h2>
        <div id="liveClock" class="live-clock">00:00:00</div>
        <br>
        <div id="modeBadge" class="mode-badge mode-local">Chế độ: AI Nội Bộ (Local)</div>
        <br>
        <div class="user-badge">👤 <strong id="displayUserId">...</strong></div>
        
        <div id="networkBanner" class="net-checking">🔄 Kiểm tra mạng...</div>
        <div id="locationBanner" class="net-checking" style="display:none;">📍 Kiểm tra GPS...</div>
        
        <div id="resultBox" class="info status-scanning">
            <div class="loader"></div> KHỞI TẠO AI...
        </div>
    </header>
    
    <div class="main-wrapper">
        <div class="guide-overlay" id="guideCircle"></div>
        <video id="webcam" autoplay playsinline muted></video>
        <canvas id="cropCanvas" style="display:none;"></canvas>
    </div>

    <script>
        // --- CẤU HÌNH ---
        const MIN_MATCH_PERCENT = 70; 
        const MAX_LOCAL_ATTEMPTS = 3; // Ngưỡng chuyển sang Server

        let failCount = 0;
        let isProcessing = true; 
        let isNetworkValid = false, isLocationValid = false;
        let currentPublicIp = "", currentPoint = { lat: 0, lng: 0 };
        let userConfig = { ccCaNhan: 1 };
        let localFaceMatcher = null;
        let lastProcessingTime = 0;

        const currentUserId = localStorage.getItem('hrm_username') || "UNKNOWN";
        document.getElementById('displayUserId').innerText = currentUserId.toUpperCase();

        const video = document.getElementById('webcam');
        const resultBox = document.getElementById('resultBox');
        const guideCircle = document.getElementById('guideCircle');

        function updateClock() {
            const now = new Date();
            document.getElementById('liveClock').innerText = now.toLocaleTimeString('vi-VN', { hour12: false });
        }
        setInterval(updateClock, 1000);

        // --- KHỞI TẠO AI TRÌNH DUYỆT ---
        async function initLocalAI() {
            try {
                const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model/';
                await Promise.all([
                    faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
                    faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
                    faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
                ]);

                // Tải ảnh mẫu từ server để tạo vector local
                const res = await fetch(`/api/user-faces/${currentUserId}`);
                const data = await res.json();
                
                let descriptors = [];
                if (data.status === 'success') {
                    for (let base64 of data.images) {
                        const img = await faceapi.fetchImage(`data:image/jpeg;base64,${base64}`);
                        const det = await faceapi.detectSingleFace(img).withFaceLandmarks().withFaceDescriptor();
                        if (det) descriptors.push(det.descriptor);
                    }
                }

                if (descriptors.length > 0) {
                    localFaceMatcher = new faceapi.FaceMatcher([new faceapi.LabeledFaceDescriptors(currentUserId, descriptors)], 0.50);
                    isProcessing = false;
                    resultBox.innerHTML = "SẴN SÀNG QUÉT MẶT";
                } else {
                    resultBox.innerHTML = "❌ CHƯA CÓ DỮ LIỆU MẶT GỐC";
                }
            } catch (e) { resultBox.innerHTML = "❌ LỖI TẢI AI"; }
        }

        // --- HÀM SO KHỚP HYBRID (LOCAL -> SERVER) ---
        async function verifyHybrid() {
            isProcessing = true;
            const now = Date.now();

            // 1. CHỤP ẢNH
            const tempCanvas = document.createElement('canvas');
            const scale = Math.min(1, 640 / video.videoWidth);
            tempCanvas.width = video.videoWidth * scale; tempCanvas.height = video.videoHeight * scale;
            const ctx = tempCanvas.getContext('2d');
            ctx.translate(tempCanvas.width, 0); ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);
            const fullImage = tempCanvas.toDataURL('image/jpeg', 0.8);

            // 2. LOGIC CHỌN CHẾ ĐỘ
            if (failCount < MAX_LOCAL_ATTEMPTS) {
                // --- CHẾ ĐỘ LOCAL ---
                resultBox.className = "info status-scanning";
                resultBox.innerHTML = `<div class="loader"></div> ĐANG SOI MẶT (LOCAL ${failCount+1}/3)...`;

                const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
                if (!detection) {
                    resultBox.innerHTML = "⚠️ KHÔNG THẤY MẶT, THỬ LẠI";
                    setTimeout(() => isProcessing = false, 1500); return;
                }

                const bestMatch = localFaceMatcher.findBestMatch(detection.descriptor);
                const matchPercent = Math.round((1 - bestMatch.distance) * 100);

                if (bestMatch.label === currentUserId && matchPercent >= MIN_MATCH_PERCENT) {
                    await logAttendance(fullImage, `Khớp Local (${matchPercent}%)`);
                } else {
                    failCount++;
                    resultBox.className = "info status-warning";
                    resultBox.innerHTML = `❌ KHÔNG KHỚP (${matchPercent}%). THỬ LẠI...`;
                    
                    if (failCount >= MAX_LOCAL_ATTEMPTS) {
                        const badge = document.getElementById('modeBadge');
                        badge.className = "mode-badge mode-server";
                        badge.innerHTML = "Chế độ: Xác thực Server (ArcFace)";
                    }
                    setTimeout(() => isProcessing = false, 2000);
                }
            } else {
                // --- CHẾ ĐỘ SERVER (ArcFace) ---
                resultBox.className = "info status-scanning";
                resultBox.innerHTML = `<div class="loader"></div> ĐANG GỬI SERVER (ArcFace)...`;

                try {
                    const response = await fetch(`/api/verify-personal`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ 
                            user_id: currentUserId, 
                            image_base64: fullImage, // Backend sẽ xử lý cắt mặt (crop) sau
                            full_image_base64: fullImage,
                            client_public_ip: currentPublicIp, 
                            latitude: currentPoint.lat,
                            longitude: currentPoint.lng,
                            attendance_type: 'Cá nhân (Server Auth)'
                        })
                    });
                    const data = await response.json();
                    if (data.recognized) {
                        resultBox.className = "info status-ok";
                        resultBox.innerHTML = `✅ SERVER: THÀNH CÔNG`;
                        setTimeout(() => window.location.href = "/attendance", 2000);
                    } else {
                        resultBox.className = "info status-err";
                        resultBox.innerHTML = `❌ SERVER: TỪ CHỐI (${data.message})`;
                        setTimeout(() => isProcessing = false, 3000);
                    }
                } catch (e) {
                    resultBox.innerHTML = "❌ LỖI KẾT NỐI SERVER";
                    setTimeout(() => isProcessing = false, 2000);
                }
            }
        }

        // Hàm phụ để đẩy log khi Local thành công
        async function logAttendance(img, note) {
            resultBox.innerHTML = `<div class="loader"></div> ĐANG LƯU KẾT QUẢ...`;
            const res = await fetch(`/api/log-local-attendance`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    user_id: currentUserId, full_image_base64: img,
                    client_public_ip: currentPublicIp, latitude: currentPoint.lat, longitude: currentPoint.lng,
                    attendance_type: 'Cá nhân (Local Match)', note: note 
                })
            });
            const data = await res.json();
            if (data.status === 'success') {
                resultBox.className = "info status-ok"; resultBox.innerHTML = "✅ THÀNH CÔNG";
                setTimeout(() => window.location.href = "/attendance", 2000);
            } else {
                resultBox.className = "info status-err"; resultBox.innerHTML = "❌ LỖI LƯU LOG";
                setTimeout(() => isProcessing = false, 2000);
            }
        }

        // --- ĐIỀU KHIỂN CAMERA & VÒNG LẶP ---
        const faceDetection = new FaceDetection({ locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}` });
        faceDetection.setOptions({ model: 'short', minDetectionConfidence: 0.7 });

        faceDetection.onResults((results) => {
            if (results.detections.length > 0) {
                const box = results.detections[0].boundingBox;
                const isCentered = (box.xCenter > 0.3 && box.xCenter < 0.7) && (box.yCenter > 0.3 && box.yCenter < 0.7);
                const isGoodSize = box.width > 0.4 && box.width < 0.75;

                if (isCentered && isGoodSize && (isNetworkValid || isLocationValid)) {
                    guideCircle.classList.add('guide-active');
                    if (!isProcessing && Date.now() - lastProcessingTime > 2500) {
                        verifyHybrid();
                        lastProcessingTime = Date.now();
                    }
                } else {
                    guideCircle.classList.remove('guide-active');
                    if (!isProcessing) resultBox.innerHTML = isCentered ? "LẠI GẦN HƠN" : "ĐƯA MẶT VÀO GIỮA";
                }
            } else {
                guideCircle.classList.remove('guide-active');
                if (!isProcessing) resultBox.innerHTML = "SẴN SÀNG QUÉT MẶT";
            }
        });

        async function start() {
            // Check Mạng & GPS
            const ipRes = await fetch('https://api.ipify.org?format=json');
            const ipData = await ipRes.json(); currentPublicIp = ipData.ip;
            const res = await fetch('/api/check-ip', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({user_id:currentUserId, client_public_ip:currentPublicIp})});
            const checkData = await res.json();
            isNetworkValid = checkData.valid;
            document.getElementById('networkBanner').className = isNetworkValid ? 'net-valid' : 'net-invalid';
            document.getElementById('networkBanner').innerHTML = isNetworkValid ? '✅ Mạng hợp lệ' : '❌ Sai mạng WiFi';
            
            // Check GPS (Rút gọn)
            navigator.geolocation.getCurrentPosition((pos) => {
                currentPoint = { lat: pos.coords.latitude, lng: pos.coords.longitude };
                isLocationValid = true; // Giả định OK để demo
                document.getElementById('locationBanner').style.display = 'block';
                document.getElementById('locationBanner').className = 'net-valid';
                document.getElementById('locationBanner').innerHTML = '✅ Vị trí hợp lệ';
            });

            await initLocalAI();
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 640 } });
            video.srcObject = stream;
            video.onloadedmetadata = () => {
                video.play();
                const loop = async () => { await faceDetection.send({ image: video }); requestAnimationFrame(loop); };
                loop();
            };
        }

        start();
    </script>
</body>
</html>
