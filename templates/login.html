<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập hệ thống - HRM</title>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0; font-family: 'Nunito', sans-serif;
            background: #f0f2f5; display: flex;
            justify-content: center; align-items: center; height: 100vh;
        }
        .login-card {
            background: white; padding: 40px; border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 380px;
        }
        .login-header { text-align: center; margin-bottom: 30px; }
        .login-header h2 { margin: 0; color: #004b72; font-size: 1.5rem; font-weight: 800; }
        .login-header p { margin: 5px 0 0; color: #6b7280; font-size: 0.9rem; }
        
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #374151; font-size: 0.9rem;}
        .form-group input { 
            width: 100%; padding: 12px; border: 1px solid #d1d5db; 
            border-radius: 8px; box-sizing: border-box; font-family: 'Nunito'; 
            font-size: 1rem; transition: 0.2s;
        }
        .form-group input:focus { border-color: #3b82f6; outline: none; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
        
        .btn-login {
            background: #004b72; color: white; width: 100%; border: none;
            padding: 12px; border-radius: 8px; font-size: 1rem; font-weight: bold;
            cursor: pointer; transition: 0.2s; margin-top: 10px;
        }
        .btn-login:hover { background: #003a59; transform: translateY(-1px); }
        
        .error-msg { color: #dc2626; font-size: 0.85rem; text-align: center; margin-top: 15px; font-weight: 600; min-height: 20px;}
    </style>
</head>
<body>

    <div class="login-card">
        <div class="login-header">
            <h2>HỆ THỐNG HRM</h2>
            <p>Đăng nhập để tiếp tục</p>
        </div>
        
        <form id="loginForm">
            <div class="form-group">
                <label>Tài khoản (Mã NV)</label>
                <input type="text" id="username" placeholder="Nhập tài khoản..." required autocomplete="username">
            </div>
            <div class="form-group">
                <label>Mật khẩu</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>
            <button type="submit" class="btn-login" id="loginBtn">ĐĂNG NHẬP</button>
            <div id="errorMsg" class="error-msg"></div>
        </form>
    </div>

    <script>
        // Xóa Token cũ nếu người dùng cố tình vào lại trang login
        localStorage.removeItem("hrm_token");
        localStorage.removeItem("hrm_role");
        localStorage.removeItem("hrm_name");

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('errorMsg');
            
            btn.textContent = "ĐANG XỬ LÝ...";
            btn.disabled = true;
            errorDiv.textContent = "";

            const payload = {
                username: document.getElementById('username').value.trim(),
                password: document.getElementById('password').value
            };

            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    // LƯU JWT TOKEN VÀO LOCAL STORAGE CỦA TRÌNH DUYỆT
                    localStorage.setItem("hrm_token", data.access_token);
                    localStorage.setItem("hrm_role", data.role);
                    localStorage.setItem("hrm_name", data.full_name);
                    localStorage.setItem("hrm_username", data.username);
                    
                    // Chuyển hướng vào trang trong
                    window.location.href = "/dashboard";
                } else {
                    errorDiv.textContent = data.detail || "Đăng nhập thất bại!";
                    btn.textContent = "ĐĂNG NHẬP";
                    btn.disabled = false;
                }
            } catch (err) {
                errorDiv.textContent = "Lỗi kết nối máy chủ!";
                btn.textContent = "ĐĂNG NHẬP";
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
