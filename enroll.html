<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG CHẤM CÔNG AI - LẤY MẪU KHUÔN MẶT</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #007bff;
            --danger: #ff4757;
            --success: #2ed573;
            --warning: #ffb800;
            --bg: #0f172a;
            --card: #1e293b;
        }

        /* Bố cục lấp đầy màn hình iPad */
        body { 
            font-family: 'Roboto', sans-serif; 
            background: var(--bg); color: #f8fafc; 
            margin: 0; padding: 15px;
            display: flex; flex-direction: column; align-items: center;
            height: 100dvh; box-sizing: border-box; overflow: hidden;
        }

        #toast {
            position: fixed; top: 20px; right: 20px;
            padding: 15px 25px; border-radius: 8px;
            color: white; font-weight: bold; z-index: 1000;
            transform: translateY(-100px); opacity: 0;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        #toast.show { transform: translateY(0); opacity: 1; }

        header { width: 100%; max-width: 700px; text-align: center; margin-bottom: 10px; flex-shrink: 0; }
        h2 { font-family: 'Orbitron', sans-serif; color: var(--primary); margin: 0; font-size: 1.2rem; }

        #statusDisplay {
            width: 100%; max-width: 700px; margin-top: 15px; padding: 12px;
            background: var(--card); border-radius: 10px; text-align: center;
            border: 1px solid rgba(255,255,255,0.1); font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem; color: #94a3b8; transition: all 0.3s;
            box-sizing: border-box;
        }

        .distance-meter {
            width: 100%; max-width: 700px; height: 6px; background: #334155;
            border-radius: 10px; margin-top: 10px; overflow: hidden; position: relative;
        }
        #distanceFill { width: 0%; height: 100%; background: var(--primary); transition: width 0.3s; }

        /* Container Camera co giãn */
        .camera-container {
            position: relative; width: 100%; max-width: 700px;
            flex: 1; background: #000; border-radius: 20px;
            overflow: hidden; border: 3px solid #334155; margin: 15px 0;
        }
        #webcam { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* Khung oval chuẩn Tablet */
        .guide-overlay {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; border: 2px dashed rgba(255,255,255,0.3);
            border-radius: 50% / 45%; width: 260px; height: 340px;
            transition: all 0.3s; z-index: 5;
        }
        .guide-active { border-color: var(--success); box-shadow: 0 0 20px var(--success); border-style: solid; background: rgba(46, 213, 115, 0.05); }

        .controls { width: 100%; max-width: 700px; display: flex; flex-direction: column; gap: 10px; flex-shrink: 0; }
        input {
            padding: 15px; border-radius: 12px; border: 1px solid #334155;
            background: #1e293b; color: white; font-size: 1.1rem; text-align: center;
        }
        input:focus { outline: none; border-color: var(--primary); }

        .btn-group { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button {
            padding: 15px; border-radius: 12px; border: none; font-weight: bold;
            color: white; cursor: pointer; transition: 0.2s; font-size: 1rem;
        }
        .btn-reg { background: var(--primary); }
        .btn-del { background: var(--danger); }
        button:disabled { background: #475569; color: #94a3b8; cursor: not-allowed; opacity: 0.7; }
        button:not(:disabled):active { transform: scale(0.95); opacity: 0.8; }

        /* Nút Quay lại góc trái trên */
        .btn-back {
            position: absolute;
            top: 15px;
            left: 33px;
            background: rgba(255, 255, 255, 0.1);
            color: #cbd5e1;
            text-decoration: none;
            padding: 8px 15px;
            border-radius: 8px;
            font-weight: bold;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 5px;
            transition: 0.2s;
            z-index: 50;
            border: 1px solid rgba(255,255,255,0.05);
            backdrop-filter: blur(5px);
        }
        .btn-back:hover {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            transform: translateX(-2px);
        }

        @media (max-width: 480px) {
            header { margin-top: 40px; }
        }
    </style>
</head>
<body>

    <div id="toast"></div>

    <a href="/employees" class="btn-back">⬅ Quay lại</a>

    <header>
        <h2>ĐĂNG KÝ NHÂN VIÊN MỚI</h2>
        <div id="statusDisplay">VUI LÒNG ĐƯA MẶT VÀO KHUNG</div>
        <div class="distance-meter">
            <div id="distanceFill"></div>
        </div>
    </header>
    
    <div class="camera-container">
        <div class="guide-overlay" id="guideCircle"></div>
        <video id="webcam" autoplay playsinline></video>
        <canvas id="cropCanvas" style="display:none;"></canvas>
    </div>

    <div class="controls">
        <input type="text" id="userId" placeholder="Mã nhân viên (VD: NV01)..." autocomplete="off">
        <div class="btn-group">
            <button class="btn-reg" id="regBtn" onclick="handleAction('register')" disabled>➕ ĐĂNG KÝ</button>
            <button class="btn-del" onclick="handleAction('unregister')">🗑️ XÓA ID</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const userIdInput = document.getElementById('userId');
        const statusDisplay = document.getElementById('statusDisplay');
        const distanceFill = document.getElementById('distanceFill');
        const guideCircle = document.getElementById('guideCircle');
        const regBtn = document.getElementById('regBtn');
        const toast = document.getElementById('toast');
        const cropCanvas = document.getElementById('cropCanvas');
        
        let lastDetection = null;
        let isFaceDetectionRunning = false;
        let isProcessing = false;
        
        // Cấu hình Tự động Đăng ký
        let consecutiveGoodFrames = 0;
        const REQUIRED_GOOD_FRAMES = 5; // Yêu cầu 5 frame hoàn hảo liên tiếp
        const SHARPNESS_THRESHOLD = 60; // Ngưỡng chống mờ

        // Tự động điền ID từ tham số URL
        const urlParams = new URLSearchParams(window.location.search);
        const paramId = urlParams.get('id') || urlParams.get('userid'); 
        if (paramId) {
            userIdInput.value = paramId.toUpperCase();
            userIdInput.blur();
        }

        // Cấu hình Ngưỡng Vị Trí (Tâm & Độ lớn)
        const FACE_MIN_SIZE = 0.35;
        const FACE_MAX_SIZE = 0.60;
        const CENTER_X_MIN = 0.35; 
        const CENTER_X_MAX = 0.65;
        const CENTER_Y_MIN = 0.35; 
        const CENTER_Y_MAX = 0.65;

        function notify(msg, type = 'success') {
            toast.innerText = msg;
            toast.style.backgroundColor = type === 'success' ? '#2ed573' : '#ff4757';
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 3000);
            
            if (!isProcessing) statusDisplay.innerText = msg;
        }

        // 1. Kiểm tra độ nét của ảnh (Chống mờ/rung tay)
        function isImageSharp(canvas, threshold = SHARPNESS_THRESHOLD) {
            try {
                const ctx = canvas.getContext('2d');
                const { width, height } = canvas;
                const imageData = ctx.getImageData(0, 0, width, height);
                const d = imageData.data;
                const gray = new Float32Array(width * height);
                for (let i = 0, j = 0; i < d.length; i += 4, j++) {
                    gray[j] = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
                }
                let sum = 0, sumSq = 0, count = 0;
                for (let y = 1; y < height - 1; y++) {
                    for (let x = 1; x < width - 1; x++) {
                        const idx = y * width + x;
                        const lap = -gray[idx - 1] - gray[idx + 1] - gray[idx - width] - gray[idx + width] + 4 * gray[idx];
                        sum += lap; sumSq += lap * lap; count++;
                    }
                }
                const mean = sum / count;
                const variance = (sumSq / count) - (mean * mean);
                return variance > threshold;
            } catch (e) {
                return true; 
            }
        }

        // 2. Kiểm tra độ sáng (Chống ngược sáng hoặc quá tối)
        function isLightingGood(canvas, minBrightness = 40, maxBrightness = 210) {
            try {
                const ctx = canvas.getContext('2d');
                const { width, height } = canvas;
                const imageData = ctx.getImageData(0, 0, width, height);
                const d = imageData.data;
                let sum = 0;
                for (let i = 0; i < d.length; i += 4) {
                    sum += 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2]; // Tính Luma
                }
                const avgBrightness = sum / (width * height);
                return avgBrightness >= minBrightness && avgBrightness <= maxBrightness;
            } catch (e) {
                return true; 
            }
        }

        async function initCamera() {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" } 
                });
                video.srcObject = stream;
            } catch (err) {
                notify("Lỗi truy cập camera: " + err.message, "error");
            }
        }

        const faceDetection = new FaceDetection({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
        });

        faceDetection.setOptions({ model: 'short', minDetectionConfidence: 0.7 });

        faceDetection.onResults((results) => {
            isFaceDetectionRunning = false;

            if (results.detections.length > 0) {
                // ĐIỀU KIỆN 1: Bắt buộc chỉ có 1 khuôn mặt trong hình (Tránh lộn xộn dữ liệu)
                if (results.detections.length > 1) {
                    consecutiveGoodFrames = 0;
                    if (!isProcessing) {
                        statusDisplay.innerText = "⚠️ CÓ NHIỀU NGƯỜI TRONG KHUNG HÌNH. HÃY ĐỨNG MỘT MÌNH!";
                        statusDisplay.style.color = "#ff4757";
                        guideCircle.classList.remove('guide-active');
                        regBtn.disabled = true;
                    }
                    return; 
                }

                lastDetection = results.detections[0].boundingBox;
                const landmarks = results.detections[0].landmarks;
                
                const faceSize = lastDetection.width;
                const faceX = lastDetection.xCenter;
                const faceY = lastDetection.yCenter;
                
                distanceFill.style.width = (faceSize * 100) + "%";

                let isCentered = (faceX > CENTER_X_MIN && faceX < CENTER_X_MAX) && 
                                 (faceY > CENTER_Y_MIN && faceY < CENTER_Y_MAX);
                
                let isStraight = true;
                let poseWarning = ""; 

                // ĐIỀU KIỆN 2: Góc mặt thẳng
                if (landmarks && landmarks.length >= 3) {
                    const eyeR = landmarks[0];
                    const eyeL = landmarks[1];
                    const nose = landmarks[2];

                    const eyeDistX = Math.abs(eyeL.x - eyeR.x);
                    const eyeDistY = Math.abs(eyeL.y - eyeR.y);

                    if (eyeDistY / eyeDistX > 0.40) {
                        isStraight = false;
                        poseWarning = `⚠️ VUI LÒNG GIỮ THẲNG ĐẦU`;
                    } else {
                        const noseDistL = Math.abs(nose.x - eyeL.x);
                        const noseDistR = Math.abs(nose.x - eyeR.x);

                        if (Math.abs(noseDistL - noseDistR) / eyeDistX > 0.40) { 
                            isStraight = false;
                            poseWarning = `⚠️ VUI LÒNG NHÌN THẲNG CAMERA`;
                        }
                    }
                }

                let isValid = true;
                let currentWarning = "";

                // Bộ lọc vị trí vật lý
                if (!userIdInput.value.trim()) {
                    isValid = false;
                    currentWarning = "VUI LÒNG NHẬP MÃ NHÂN VIÊN ĐỂ BẮT ĐẦU";
                } else if (!isCentered) {
                    isValid = false;
                    currentWarning = "HÃY ĐƯA MẶT VÀO GIỮA KHUNG";
                } else if (!isStraight) {
                    isValid = false;
                    currentWarning = poseWarning;
                } else if (faceSize < FACE_MIN_SIZE) {
                    isValid = false;
                    currentWarning = "HÃY LẠI GẦN HƠN";
                } else if (faceSize > FACE_MAX_SIZE) {
                    isValid = false;
                    currentWarning = "HÃY ĐỨNG XA RA CHÚT";
                }

                if (!isProcessing) {
                    if (!isValid) {
                        consecutiveGoodFrames = 0;
                        statusDisplay.innerText = currentWarning;
                        statusDisplay.style.color = currentWarning.includes("MÃ NHÂN VIÊN") ? "#007bff" : "#ffb800";
                        guideCircle.classList.remove('guide-active');
                        regBtn.disabled = true;
                    } else {
                        guideCircle.classList.add('guide-active');
                        regBtn.disabled = false;
                        
                        consecutiveGoodFrames++;
                        statusDisplay.innerText = `ĐANG LẤY MẪU CHUẨN... ${consecutiveGoodFrames}/${REQUIRED_GOOD_FRAMES}`;
                        statusDisplay.style.color = "#2ed573";

                        // Khi đủ Frame => Kiểm tra Độ Nét & Ánh Sáng => Tự động Enroll
                        if (consecutiveGoodFrames >= REQUIRED_GOOD_FRAMES) {
                            captureCroppedFace(); // Bơm ảnh nháp vào Canvas
                            
                            const isSharp = isImageSharp(cropCanvas);
                            const isGoodLight = isLightingGood(cropCanvas);

                            if (!isSharp || !isGoodLight) {
                                let errorMsg = !isSharp ? "⚠️ ẢNH MỜ, VUI LÒNG GIỮ YÊN ĐẦU" : "⚠️ ÁNH SÁNG KHÔNG ĐẢM BẢO (QUÁ TỐI/CHÓI)";
                                statusDisplay.innerText = errorMsg;
                                statusDisplay.style.color = "#ffb800";
                                consecutiveGoodFrames = 0; // Reset đếm lại
                            } else {
                                handleAction('register'); // GỌI API AUTO
                            }
                        }
                    }
                }
            } else {
                lastDetection = null;
                distanceFill.style.width = "0%";
                consecutiveGoodFrames = 0;
                
                if (!isProcessing) {
                    statusDisplay.innerText = "KHÔNG TÌM THẤY KHUÔN MẶT";
                    statusDisplay.style.color = "#94a3b8";
                    guideCircle.classList.remove('guide-active');
                    regBtn.disabled = true;
                }
            }
        });

        function captureCroppedFace() {
            if (!lastDetection) return null;

            const videoW = video.videoWidth;
            const videoH = video.videoHeight;
            let { xCenter, yCenter, width, height } = lastDetection;

            const padding = 0.25;
            let cropW = width * (1 + padding) * videoW;
            let cropH = height * (1 + padding) * videoH;
            
            let startX = (xCenter * videoW) - (cropW / 2);
            let startY = (yCenter * videoH) - (cropH / 2);

            startX = Math.max(0, startX);
            startY = Math.max(0, startY);
            cropW = Math.min(videoW - startX, cropW);
            cropH = Math.min(videoH - startY, cropH);

            cropCanvas.width = 224; 
            cropCanvas.height = 224;
            const ctx = cropCanvas.getContext('2d');
            
            ctx.translate(224, 0);
            ctx.scale(-1, 1);
            
            ctx.drawImage(video, startX, startY, cropW, cropH, 0, 0, 224, 224);
            return cropCanvas.toDataURL('image/jpeg', 0.9);
        }

        async function handleAction(action) {
            if (isProcessing) return; 
            
            const userId = userIdInput.value.trim().toUpperCase(); 
            if (!userId) {
                notify("Vui lòng nhập ID nhân viên!", "error");
                return;
            }

            if (action === 'unregister' && !confirm(`Xác nhận xóa dữ liệu của ${userId}?`)) return;

            isProcessing = true;
            regBtn.disabled = true;
            statusDisplay.innerText = action === 'register' ? "ĐANG ĐẨY DỮ LIỆU LÊN SERVER..." : "ĐANG XÓA...";
            statusDisplay.style.color = "#007bff";
            
            try {
                let response;
                if (action === 'register') {
                    // Chụp khung hình mới nhất để gửi đi
                    const faceBase64 = captureCroppedFace();
                    if (!faceBase64) {
                        notify("Lỗi xén ảnh, hãy thử lại!", "error");
                        isProcessing = false;
                        return;
                    }

                    response = await fetch(`/register`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: userId, image_base64: faceBase64 })
                    });
                } else {
                    response = await fetch(`/unregister`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ user_id: userId })
                    });
                }

                const data = await response.json();

                if (response.ok) {
                    notify(`${action === 'register' ? 'Đã đăng ký' : 'Đã xóa'} mẫu khuôn mặt của: ${userId}`, "success");
                    if (action === 'unregister') {
                        userIdInput.value = "";
                    } else {
                        statusDisplay.innerText = "✅ ĐĂNG KÝ HOÀN TẤT";
                        statusDisplay.style.color = "#2ed573";
                        if(userId === "HUNGND"){
                            setTimeout(() => { window.location.href = "/employees"; }, 1000);
                        }
                        else {
                            setTimeout(() => { window.location.href = "/dashboard"; }, 1000);
                        }
                    }
                } else {
                    notify(data.detail || data.message || "Thất bại", "error");
                }
            } catch (err) {
                notify("Lỗi kết nối Server!", "error");
            } finally {
                // Khóa hệ thống 3 giây để người dùng lùi ra, tránh đăng ký chồng chéo
                setTimeout(() => {
                    isProcessing = false;
                    consecutiveGoodFrames = 0;
                }, 3000);
            }
        }

        // Vòng lặp tối ưu bằng requestAnimationFrame
        async function processVideoFrame() {
            if (video.readyState >= 2 && !isFaceDetectionRunning) {
                isFaceDetectionRunning = true;
                await faceDetection.send({ image: video });
            }
            requestAnimationFrame(processVideoFrame);
        }

        initCamera();
        video.onloadedmetadata = () => {
            processVideoFrame();
        };
    </script>
</body>
</html>
