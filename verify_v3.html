<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BND Kiosk - Face Recognition</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary: #00f2ff;
            --success: #00ff88;
            --warning: #ffb800;
            --error: #ff4444;
            --bg: #0f172a;
            --card: #1e293b;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--bg);
            color: #f8fafc;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100dvh;
            box-sizing: border-box;
            overflow: hidden;
        }

        header {
            width: 100%;
            max-width: 700px;
            text-align: center;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--primary);
            margin: 5px 0 15px 0;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        .info {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            padding: 15px;
            border-radius: 12px;
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: bold;
            text-align: center;
            line-height: 1.4;
        }

        .distance-meter {
            width: 100%;
            height: 6px;
            background: #334155;
            border-radius: 10px;
            margin-top: 15px;
            overflow: hidden;
            position: relative;
        }

        #distanceFill {
            width: 0%;
            height: 100%;
            background: var(--primary);
            transition: width 0.3s ease, background 0.3s ease;
        }

        .frame-progress {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin-top: 10px;
            padding: 5px;
        }

        .frame-dot {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: #334155;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .frame-dot.active {
            background: var(--success);
            box-shadow: 0 0 15px var(--success);
            transform: scale(1.2);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .frame-dot.processing {
            background: var(--primary);
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.7; transform: scale(1.1); }
        }

        .main-wrapper {
            position: relative;
            width: 100%;
            max-width: 700px;
            flex: 1;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #334155;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* --- THÊM CSS CHO CANVAS TRACKING --- */
        #overlayCanvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Khớp với video */
            transform: scaleX(-1); /* Lật cùng chiều với video */
            pointer-events: none; /* Không cản trở click */
            z-index: 4; /* Nằm trên video, dưới guide overlay */
        }

        .guide-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            border: 2px dashed rgba(255, 255, 255, 0.3);
            border-radius: 50% / 45%;
            width: 260px;
            height: 340px;
            transition: all 0.3s;
            z-index: 5;
        }

        .guide-active {
            border-color: var(--success);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.4);
            border-style: solid;
            background: rgba(0, 255, 136, 0.05);
        }

        .scan-bar {
            position: absolute;
            width: 100%;
            height: 3px;
            background: linear-gradient(to bottom, transparent, var(--primary));
            box-shadow: 0 0 15px var(--primary);
            top: 0;
            z-index: 5;
            animation: scan 3s ease-in-out infinite;
            opacity: 0.6;
        }

        @keyframes scan {
            0%, 100% { top: 5%; }
            50% { top: 95%; }
        }

        .status-scanning { color: var(--primary); border-color: var(--primary); }
        .status-ok { color: var(--success); border-color: var(--success); background: rgba(0, 255, 136, 0.1); box-shadow: 0 0 15px rgba(0, 255, 136, 0.3); }
        .status-warning { color: var(--warning); border-color: var(--warning); }
        .status-err { color: var(--error); border-color: var(--error); background: rgba(255, 68, 68, 0.1); }
        .status-sleep { color: #94a3b8; border-color: #475569; background: #1e293b; }

        .loader {
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* ================= BẢNG LỊCH SỬ ================= */
        .history-container {
            width: 100%;
            max-width: 700px;
            margin-top: 15px;
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 12px;
            flex-shrink: 0;
            box-sizing: border-box;
        }

        .history-title { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: #94a3b8; margin-bottom: 10px; letter-spacing: 1px; display: flex; align-items: center; gap: 5px; }
        .history-list { list-style: none; padding: 0; margin: 0; display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; width: 100%; }
        
        .history-item {
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; padding: 10px 5px;
            background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 12px; text-align: center; animation: popIn 0.3s ease; overflow: hidden;
        }

        .history-item:first-child { background: rgba(0, 255, 136, 0.15); border: 1px solid rgba(0, 255, 136, 0.5); box-shadow: 0 0 10px rgba(0, 255, 136, 0.2); }
        .history-time { color: #cbd5e1; font-family: monospace; font-size: 0.75rem; }
        .history-name { font-weight: bold; color: var(--success); font-size: 0.85rem; width: 100%; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; text-overflow: ellipsis; line-height: 1.3; word-wrap: break-word; min-height: 2.6em; }
        .history-prob { color: var(--primary); font-size: 0.75rem; background: rgba(0, 242, 255, 0.1); padding: 2px 8px; border-radius: 10px; margin-top: 2px; }

        @keyframes popIn { 0% { opacity: 0; transform: scale(0.8); } 100% { opacity: 1; transform: scale(1); } }

        /* ================= POPUP XIN CHÀO ================= */
        .popup-overlay {
            position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(15, 23, 42, 0.9); display: none; align-items: center; justify-content: center; z-index: 10000; backdrop-filter: blur(8px);
        }

        .popup-content {
            background: var(--card); border: 2px solid var(--success); padding: 30px 40px; border-radius: 20px; text-align: center; box-shadow: 0 15px 40px rgba(0, 255, 136, 0.3); animation: popIn 0.3s ease-out; position: relative; max-width: 80%;
        }

        .popup-close { position: absolute; top: 10px; right: 15px; background: none; border: none; color: #94a3b8; font-size: 1.5rem; cursor: pointer; transition: 0.2s; }
        .popup-close:hover { color: #fff; transform: scale(1.1); }
        .popup-icon { font-size: 3.5rem; margin-bottom: 10px; }
        .popup-title { color: #fff; font-size: 1.1rem; margin: 0 0 5px 0; font-weight: normal; }
        .popup-name { color: var(--success); font-size: 1.8rem; font-family: 'Orbitron', sans-serif; margin: 0; text-shadow: 0 0 15px rgba(0, 255, 136, 0.5); font-weight: bold; }

        /* ================= MÀN HÌNH NGỦ ĐÔNG ================= */
        #sleepOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.95); z-index: 50; display: none; flex-direction: column; align-items: center; justify-content: center; backdrop-filter: blur(10px);
        }

        .btn-wake { background: var(--primary); color: #000; border: none; padding: 18px 35px; font-size: 1.2rem; font-family: 'Orbitron', sans-serif; font-weight: bold; border-radius: 40px; cursor: pointer; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4); transition: 0.3s; display: flex; align-items: center; gap: 10px; }
        .btn-wake:hover { transform: scale(1.05); box-shadow: 0 0 35px rgba(0, 242, 255, 0.8); }
        .icon-sleep { font-size: 3rem; margin-bottom: 15px; animation: float 3s ease-in-out infinite; }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    </style>
</head>

<body>

    <header>
        <h3>Chấm công Bệnh viện Bệnh Nhiệt Đới</h3>
        <div id="resultBox" class="info status-scanning">
            <div class="loader"></div> ĐANG KHỞI TẠO HỆ THỐNG AI...
        </div>
        <div class="distance-meter">
            <div id="distanceFill"></div>
        </div>
        <div class="frame-progress">
            <div id="frame1" class="frame-dot"></div>
            <div id="frame2" class="frame-dot"></div>
            <div id="frame3" class="frame-dot"></div>
        </div>
    </header>

    <div class="main-wrapper">
        <div id="sleepOverlay">
            <div class="icon-sleep">💤</div>
            <button class="btn-wake" onclick="wakeUp()">👋 CHẠM ĐỂ KHỞI ĐỘNG</button>
        </div>

        <div class="guide-overlay" id="guideCircle"></div>
        <div class="scan-bar"></div>
        
        <video id="webcam" autoplay playsinline></video>
        <canvas id="overlayCanvas"></canvas>
        <canvas id="cropCanvas" style="display:none;"></canvas>
    </div>

    <div class="history-container">
        <div class="history-title"><span style="color:var(--success)">●</span> Danh sách chấm công thành công</div>
        <ul class="history-list" id="historyList"></ul>
    </div>

    <div class="popup-overlay" id="successPopup" onclick="closePopup()">
        <div class="popup-content" onclick="event.stopPropagation()">
            <button class="popup-close" onclick="closePopup()">✖</button>
            <div class="popup-icon">✅</div>
            <p class="popup-title">CHẤM CÔNG THÀNH CÔNG</p>
            <p class="popup-name" id="popupUserName">...</p>
        </div>
    </div>

    <script type="module">
        import { FaceDetector, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3";

        const video = document.getElementById('webcam');
        const overlayCanvas = document.getElementById('overlayCanvas');
        const overlayCtx = overlayCanvas.getContext('2d');
        const resultBox = document.getElementById('resultBox');
        const distanceFill = document.getElementById('distanceFill');
        const guideCircle = document.getElementById('guideCircle');
        const cropCanvas = document.getElementById('cropCanvas');
        const historyList = document.getElementById('historyList');

        let faceDetector;
        let isModelReady = false;

        let lastProcessingTime = 0;
        let isProcessing = false;
        let lastDetection = null; 
        let currentPublicIp = '';
        let popupTimer = null;
        let hasCalledAPIForCurrentSession = false;

        let sleepTimer = null;
        let isSleeping = false;
        const IDLE_TIMEOUT = 5 * 60 * 1000;

        let consecutiveGoodFrames = 0;
        const REQUIRED_GOOD_FRAMES = 3; 
        let lastProcessedFrameTime = 0;

        const FACE_MIN_SIZE = 0.30;
        const FACE_MAX_SIZE = 0.55;
        const CENTER_X_MIN = 0.4;
        const CENTER_X_MAX = 0.6;
        const CENTER_Y_MIN = 0.38;
        const CENTER_Y_MAX = 0.62;

        async function initModel() {
            try {
                const vision = await FilesetResolver.forVisionTasks(
                    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.3/wasm"
                );
                faceDetector = await FaceDetector.createFromOptions(vision, {
                    baseOptions: {
                        modelAssetPath: "https://storage.googleapis.com/mediapipe-models/face_detector/blaze_face_short_range/float16/1/blaze_face_short_range.tflite",
                        delegate: "GPU"
                    },
                    runningMode: "VIDEO"
                });
                
                isModelReady = true;
                resultBox.className = "info status-scanning";
                resultBox.innerHTML = `<div class="loader"></div> ĐANG KHỞI TẠO CAMERA...`;
                startCamera();
            } catch (e) {
                console.error("Lỗi khởi tạo AI:", e);
                resultBox.className = "info status-err";
                resultBox.innerHTML = `❌ LỖI TẢI MÔ HÌNH AI`;
            }
        }

        function updateFrameProgress(count) {
            const dots = ['frame1', 'frame2', 'frame3'];
            dots.forEach((id, index) => {
                const dot = document.getElementById(id);
                if (dot) {
                    if (index < count) {
                        dot.classList.add('active');
                        dot.classList.remove('processing');
                    } else {
                        dot.classList.remove('active');
                        if (isProcessing && index === count) {
                            dot.classList.add('processing');
                        } else {
                            dot.classList.remove('processing');
                        }
                    }
                }
            });
        }

        function resetSleepTimer() {
            if (sleepTimer) clearTimeout(sleepTimer);
            if (!isSleeping) {
                sleepTimer = setTimeout(enterSleepMode, IDLE_TIMEOUT);
            }
        }

        function enterSleepMode() {
            isSleeping = true;
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
            document.getElementById('sleepOverlay').style.display = 'flex';
            document.getElementById('resultBox').className = "info status-sleep";
            document.getElementById('resultBox').innerHTML = "💤 HỆ THỐNG ĐANG TẠM NGHỈ";
            guideCircle.classList.remove('guide-active');
            distanceFill.style.width = "0%";
            consecutiveGoodFrames = 0;
            updateFrameProgress(0);
            
            // Xóa canvas theo dõi khi ngủ
            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);
        }

        window.wakeUp = async function() {
            isSleeping = false;
            document.getElementById('sleepOverlay').style.display = 'none';
            document.getElementById('resultBox').className = "info status-scanning";
            document.getElementById('resultBox').innerHTML = `<div class="loader"></div> ĐANG KHỞI ĐỘNG LẠI CAMERA...`;
            await startCamera();
            resetSleepTimer();
        }

        window.closePopup = function() {
            document.getElementById('successPopup').style.display = 'none';
        }

        function captureCroppedFace() {
            if (!lastDetection) return null;

            const bbox = lastDetection.boundingBox;
            const keypoints = lastDetection.keypoints;
            const videoW = video.videoWidth;
            const videoH = video.videoHeight;

            const rX = keypoints[0].x * videoW;
            const rY = keypoints[0].y * videoH;
            const lX = keypoints[1].x * videoW;
            const lY = keypoints[1].y * videoH;
            
            const angle = Math.atan2(lY - rY, lX - rX);
            const pad = bbox.width * 0.25;
            
            const paddedCanvas = document.createElement('canvas');
            const pCtx = paddedCanvas.getContext('2d');
            
            paddedCanvas.width = bbox.width + pad * 2;
            paddedCanvas.height = bbox.height + pad * 2;
            pCtx.fillStyle = 'white';
            pCtx.fillRect(0, 0, paddedCanvas.width, paddedCanvas.height);

            pCtx.drawImage(
                video,
                bbox.originX - pad, bbox.originY - pad, 
                bbox.width + pad * 2, bbox.height + pad * 2,
                0, 0, 
                paddedCanvas.width, paddedCanvas.height
            );

            cropCanvas.width = 224;
            cropCanvas.height = 224;
            const ctx = cropCanvas.getContext('2d');

            ctx.save();
            ctx.translate(224, 0);
            ctx.scale(-1, 1);
            ctx.translate(112, 112); 
            ctx.rotate(-angle); 
            
            const finalScale = 224 / paddedCanvas.width;
            ctx.scale(finalScale, finalScale);

            ctx.drawImage(paddedCanvas, -paddedCanvas.width / 2, -paddedCanvas.height / 2, paddedCanvas.width, paddedCanvas.height);
            ctx.restore();

            return cropCanvas.toDataURL('image/jpeg', 0.9);
        }

        function captureFullFrame() {
            const tempCanvas = document.createElement('canvas');
            const maxWidth = 640;
            const scale = Math.min(1, maxWidth / video.videoWidth);

            tempCanvas.width = video.videoWidth * scale;
            tempCanvas.height = video.videoHeight * scale;
            const ctx = tempCanvas.getContext('2d');

            ctx.translate(tempCanvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);

            return tempCanvas.toDataURL('image/jpeg', 0.7);
        }

        function addHistoryItem(userId, probability) {
            const timeString = new Date().toLocaleTimeString('vi-VN', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const li = document.createElement('li');
            li.className = 'history-item';
            li.innerHTML = `
                <span class="history-time">${timeString}</span>
                <span class="history-name" title="${userId}">${userId.toUpperCase()}</span>
                <span class="history-prob">${probability}</span>
            `;

            historyList.prepend(li);
            if (historyList.children.length > 5) {
                historyList.removeChild(historyList.lastChild);
            }
        }

        function triggerSuccessPopup(name) {
            const popup = document.getElementById('successPopup');
            document.getElementById('popupUserName').innerText = name;
            popup.style.display = 'flex';

            if (popupTimer) clearTimeout(popupTimer);
            popupTimer = setTimeout(() => { closePopup(); }, 1500);
        }

        async function sendToAPI() {
            isProcessing = true;
            resultBox.className = "info status-scanning";
            resultBox.innerHTML = `<div class="loader"></div> ĐANG PHÂN TÍCH AI...`;
            updateFrameProgress(REQUIRED_GOOD_FRAMES);
            
            // Xóa tracking khi đang gửi API để tránh giật lag
            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

            try {
                const croppedImage = captureCroppedFace();
                const fullImage = captureFullFrame();

                if (!croppedImage || !fullImage) throw new Error("Không capture được ảnh");

                const response = await fetch(`/recognize`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        image_base64: croppedImage,
                        full_image_base64: fullImage,
                        client_public_ip: currentPublicIp,
                        attendance_type: 'Tập trung'
                    })
                });

                const data = await response.json();

                if (data.recognized) {
                    resultBox.className = "info status-ok";
                    resultBox.innerHTML = `✅ XIN CHÀO: ${data.user_id.toUpperCase()}`;
                    addHistoryItem(data.user_id, data.match_probability);
                    triggerSuccessPopup(data.user_id.toUpperCase());
                } else {
                    resultBox.className = "info status-warning";
                    resultBox.innerHTML = `⚠️ KHÔNG NHẬN DIỆN ĐƯỢC`;
                }

            } catch (e) {
                console.error("Lỗi API:", e);
                resultBox.className = "info status-err";
                resultBox.innerHTML = `⚠️ LỖI KẾT NỐI`;
            } finally {
                setTimeout(() => {
                    isProcessing = false;
                    hasCalledAPIForCurrentSession = false;
                    consecutiveGoodFrames = 0;
                    updateFrameProgress(0);
                }, 2000);
            }
        }

        async function processVideoFrame() {
            if (isSleeping || video.readyState < 2 || !isModelReady) {
                requestAnimationFrame(processVideoFrame);
                return;
            }

            const results = faceDetector.detectForVideo(video, performance.now());
            
            // Luôn xóa canvas tracking đầu mỗi frame
            overlayCtx.clearRect(0, 0, overlayCanvas.width, overlayCanvas.height);

            if (results.detections.length > 0) {
                resetSleepTimer();

                const detection = results.detections[0];
                lastDetection = detection; 
                const bbox = detection.boundingBox;
                const keypoints = detection.keypoints;

                // ---- VẼ TRACKING LÊN OVERLAY CANVAS ----
                if (!isProcessing) {
                    // Vẽ Box
                    overlayCtx.strokeStyle = "#00f2ff"; // Màu đồng bộ với giao diện
                    overlayCtx.lineWidth = 3;
                    overlayCtx.strokeRect(bbox.originX, bbox.originY, bbox.width, bbox.height);
                    
                    // Vẽ Mắt trái & phải
                    overlayCtx.fillStyle = "#00ff88";
                    const rE = keypoints[0], lE = keypoints[1], nose = keypoints[2];
                    overlayCtx.beginPath(); overlayCtx.arc(rE.x * overlayCanvas.width, rE.y * overlayCanvas.height, 4, 0, 2*Math.PI); overlayCtx.fill();
                    overlayCtx.beginPath(); overlayCtx.arc(lE.x * overlayCanvas.width, lE.y * overlayCanvas.height, 4, 0, 2*Math.PI); overlayCtx.fill();
                    // Vẽ Mũi
                    overlayCtx.fillStyle = "#ffb800";
                    overlayCtx.beginPath(); overlayCtx.arc(nose.x * overlayCanvas.width, nose.y * overlayCanvas.height, 4, 0, 2*Math.PI); overlayCtx.fill();
                }
                // ------------------------------------------

                const faceSize = bbox.width / video.videoWidth;
                const faceX = (bbox.originX + bbox.width / 2) / video.videoWidth;
                const faceY = (bbox.originY + bbox.height / 2) / video.videoHeight;

                distanceFill.style.width = (faceSize * 100) + "%";

                const isCentered = (faceX > CENTER_X_MIN && faceX < CENTER_X_MAX) &&
                                   (faceY > CENTER_Y_MIN && faceY < CENTER_Y_MAX);

                let isStraight = true;
                let poseWarning = "";

                if (keypoints && keypoints.length >= 3) {
                    const eyeR = keypoints[0], eyeL = keypoints[1], nose = keypoints[2];
                    const eyeDistX = Math.abs(eyeL.x - eyeR.x);
                    const eyeDistY = Math.abs(eyeL.y - eyeR.y);

                    if (eyeDistY / eyeDistX > 0.25) {
                        isStraight = false;
                        poseWarning = `⚠️ VUI LÒNG GIỮ THẲNG ĐẦU`;
                    } else {
                        const noseDistL = Math.abs(nose.x - eyeL.x);
                        const noseDistR = Math.abs(nose.x - eyeR.x);
                        if (Math.abs(noseDistL - noseDistR) / eyeDistX > 0.35) {
                            isStraight = false;
                            poseWarning = `⚠️ VUI LÒNG NHÌN THẲNG CAMERA`;
                        }
                    }
                }

                if (!isCentered) {
                    guideCircle.classList.remove('guide-active');
                    consecutiveGoodFrames = 0;
                    updateFrameProgress(0);
                    if (!isProcessing) {
                        resultBox.className = "info status-warning";
                        resultBox.innerHTML = `⚠️ HÃY ĐƯA MẶT VÀO GIỮA KHUNG`;
                    }
                }
                else if (!isStraight) {
                    guideCircle.classList.remove('guide-active');
                    consecutiveGoodFrames = 0;
                    updateFrameProgress(0);
                    if (!isProcessing) {
                        resultBox.className = "info status-warning";
                        resultBox.innerHTML = poseWarning;
                    }
                }
                else if (faceSize < FACE_MIN_SIZE) {
                    guideCircle.classList.remove('guide-active');
                    consecutiveGoodFrames = 0;
                    updateFrameProgress(0);
                    if (!isProcessing) {
                        resultBox.className = "info status-warning";
                        resultBox.innerHTML = `⚠️ VUI LÒNG LẠI GẦN CAMERA HƠN`;
                    }
                }
                else if (faceSize > FACE_MAX_SIZE) {
                    guideCircle.classList.remove('guide-active');
                    consecutiveGoodFrames = 0;
                    updateFrameProgress(0);
                    if (!isProcessing) {
                        resultBox.className = "info status-warning";
                        resultBox.innerHTML = `⚠️ VUI LÒNG ĐỨNG XA RA CHÚT`;
                    }
                }
                else {
                    guideCircle.classList.add('guide-active');

                    if (!isProcessing && !hasCalledAPIForCurrentSession) {
                        consecutiveGoodFrames = Math.min(consecutiveGoodFrames + 1, REQUIRED_GOOD_FRAMES);
                        updateFrameProgress(consecutiveGoodFrames);
                    }

                    if (!isProcessing && !hasCalledAPIForCurrentSession && consecutiveGoodFrames < REQUIRED_GOOD_FRAMES) {
                        resultBox.className = "info status-scanning";
                        resultBox.innerHTML = `📸 ĐANG XÁC NHẬN... ${consecutiveGoodFrames}/${REQUIRED_GOOD_FRAMES}`;
                    }

                    if (!isProcessing && !hasCalledAPIForCurrentSession && consecutiveGoodFrames >= REQUIRED_GOOD_FRAMES) {
                        hasCalledAPIForCurrentSession = true;
                        sendToAPI();
                        lastProcessedFrameTime = Date.now();
                    }
                }
            } else {
                lastDetection = null;
                distanceFill.style.width = "0%";
                guideCircle.classList.remove('guide-active');
                consecutiveGoodFrames = 0;
                updateFrameProgress(0);

                if (!isProcessing && !isSleeping && isModelReady) {
                    resultBox.className = "info status-scanning";
                    resultBox.innerHTML = "SẴN SÀNG QUÉT KHUÔN MẶT";
                }
            }

            requestAnimationFrame(processVideoFrame);
        }

        async function startCamera() {
            verifyNetwork();
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } }
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    // Cập nhật độ phân giải thật của canvas khớp với video
                    overlayCanvas.width = video.videoWidth;
                    overlayCanvas.height = video.videoHeight;
                    requestAnimationFrame(processVideoFrame);
                }
            } catch (err) {
                resultBox.className = "info status-err";
                resultBox.innerHTML = "❌ LỖI TRUY CẬP CAMERA";
            }
        }

        async function verifyNetwork() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                currentPublicIp = ipData.ip;
            } catch (e) {
                console.warn("Không lấy được IP mạng: ", e);
            }
        }

        function scheduleMorningReload() {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();

            let targetTime = new Date(now.getTime());
            targetTime.setSeconds(0);
            targetTime.setMilliseconds(0);

            if (currentHour >= 6 && currentHour < 8) {
                const next10MinMark = Math.ceil((currentMinute + 1) / 10) * 10;
                if (next10MinMark === 60) {
                    targetTime.setHours(currentHour + 1);
                    targetTime.setMinutes(0);
                } else {
                    targetTime.setMinutes(next10MinMark);
                }
            } else if (currentHour < 6) {
                targetTime.setHours(6, 0, 0, 0);
            } else {
                targetTime.setDate(targetTime.getDate() + 1);
                targetTime.setHours(6, 0, 0, 0);
            }

            const msUntilReload = targetTime.getTime() - now.getTime();
            setTimeout(() => { window.location.reload(true); }, msUntilReload);
        }

        // Bắt đầu khởi tạo quy trình
        initModel();
        resetSleepTimer();
        scheduleMorningReload();
    </script>
</body>
