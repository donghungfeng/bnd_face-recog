<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BND Kiosk - Face Recognition</title>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_detection"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Roboto:wght@300;400&display=swap"
        rel="stylesheet">

    <style>
        :root {
            --primary: #00f2ff;
            --success: #00ff88;
            --warning: #ffb800;
            --error: #ff4444;
            --bg: #0f172a;
            --card: #1e293b;
        }

        body {
            font-family: 'Roboto', sans-serif;
            background: var(--bg);
            color: #f8fafc;
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            height: 100dvh;
            box-sizing: border-box;
            overflow: hidden;
        }

        header {
            width: 100%;
            max-width: 700px;
            text-align: center;
            margin-bottom: 10px;
            flex-shrink: 0;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.2rem;
            color: var(--primary);
            margin: 5px 0 15px 0;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.3);
        }

        .info {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.95rem;
            padding: 15px;
            border-radius: 12px;
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-weight: bold;
            text-align: center;
            line-height: 1.4;
        }

        /* THANH GỒNG (HOLD METER) */
        .hold-meter {
            width: 100%;
            height: 12px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            margin-top: 15px;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255,255,255,0.2);
            box-shadow: inset 0 0 10px rgba(0,0,0,0.5);
        }

        #holdFill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, var(--warning), var(--success));
            transition: width 0.15s linear;
            box-shadow: 0 0 15px var(--success);
        }

        .main-wrapper {
            position: relative;
            width: 100%;
            max-width: 700px;
            flex: 1;
            background: #000;
            border-radius: 15px;
            overflow: hidden;
            border: 2px solid #334155;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.5);
        }

        #webcam {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        /* MẶT NẠ CHUYÊN NGHIỆP */
        .face-mask {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 260px;
            height: 360px;
            border-radius: 50% / 45%;
            border: 3px dashed rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 0 2000px rgba(15, 23, 42, 0.8);
            z-index: 5;
            pointer-events: none;
            transition: all 0.3s ease;
        }

        .face-mask.active {
            border: 4px solid var(--success);
            background: rgba(0, 255, 136, 0.05);
            box-shadow: 0 0 0 2000px rgba(15, 23, 42, 0.85), 0 0 30px var(--success) inset;
        }

        .scan-bar {
            position: absolute;
            width: 100%;
            height: 3px;
            background: linear-gradient(to bottom, transparent, var(--primary));
            box-shadow: 0 0 15px var(--primary);
            top: 0;
            z-index: 6;
            animation: scan 3s ease-in-out infinite;
            opacity: 0.6;
        }

        @keyframes scan {
            0%, 100% { top: 5%; }
            50% { top: 95%; }
        }

        .status-scanning { color: var(--primary); border-color: var(--primary); }
        .status-ok { color: var(--success); border-color: var(--success); background: rgba(0, 255, 136, 0.1); box-shadow: 0 0 15px rgba(0, 255, 136, 0.3); }
        .status-warning { color: var(--warning); border-color: var(--warning); }
        .status-err { color: var(--error); border-color: var(--error); background: rgba(255, 68, 68, 0.1); }
        .status-sleep { color: #94a3b8; border-color: #475569; background: #1e293b; }

        .loader {
            width: 18px;
            height: 18px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* BẢNG LỊCH SỬ */
        .history-container {
            width: 100%;
            max-width: 700px;
            margin-top: 15px;
            background: var(--card);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 12px;
            flex-shrink: 0;
            box-sizing: border-box;
        }

        .history-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.8rem;
            color: #94a3b8;
            margin-bottom: 10px;
            letter-spacing: 1px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
            width: 100%;
        }

        .history-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 4px;
            padding: 10px 5px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            text-align: center;
            animation: popIn 0.3s ease;
            overflow: hidden;
        }

        .history-item:first-child {
            background: rgba(0, 255, 136, 0.15);
            border: 1px solid rgba(0, 255, 136, 0.5);
            box-shadow: 0 0 10px rgba(0, 255, 136, 0.2);
        }

        .history-time { color: #cbd5e1; font-family: monospace; font-size: 0.75rem; }
        .history-name {
            font-weight: bold;
            color: var(--success);
            font-size: 0.85rem;
            width: 100%;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            line-height: 1.3;
            word-wrap: break-word;
            min-height: 2.6em;
        }

        .history-prob {
            color: var(--primary);
            font-size: 0.75rem;
            background: rgba(0, 242, 255, 0.1);
            padding: 2px 8px;
            border-radius: 10px;
            margin-top: 2px;
        }

        @keyframes popIn {
            0% { opacity: 0; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1); }
        }

        /* POPUP XIN CHÀO & POPUP RENEW */
        .popup-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(15, 23, 42, 0.9);
            display: none; align-items: center; justify-content: center;
            z-index: 10000; backdrop-filter: blur(8px);
        }

        .popup-content {
            background: var(--card);
            border: 2px solid var(--success);
            padding: 30px 40px;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0, 255, 136, 0.3);
            animation: popIn 0.3s ease-out;
            position: relative;
            max-width: 80%;
        }
        
        /* Popup Renew mang phong cách cảnh báo nhẹ */
        .popup-renew { border-color: var(--primary); box-shadow: 0 15px 40px rgba(0, 242, 255, 0.3); }

        .popup-close {
            position: absolute; top: 10px; right: 15px;
            background: none; border: none; color: #94a3b8; font-size: 1.5rem;
            cursor: pointer; transition: 0.2s;
        }
        .popup-close:hover { color: #fff; transform: scale(1.1); }
        .popup-icon { font-size: 3.5rem; margin-bottom: 10px; }
        .popup-title { color: #fff; font-size: 1.1rem; margin: 0 0 5px 0; font-weight: normal; }
        .popup-name {
            color: var(--success); font-size: 1.8rem; font-family: 'Orbitron', sans-serif;
            margin: 0; text-shadow: 0 0 15px rgba(0, 255, 136, 0.5); font-weight: bold;
        }

        /* Nút cho Popup Renew */
        .btn-action {
            padding: 12px 20px; border: none; border-radius: 8px; font-weight: bold;
            font-size: 1rem; cursor: pointer; transition: 0.2s; flex: 1; font-family: 'Roboto', sans-serif;
        }
        .btn-confirm { background: var(--primary); color: #000; box-shadow: 0 0 10px rgba(0, 242, 255, 0.4); }
        .btn-confirm:hover { background: #00d4ff; transform: scale(1.05); }
        .btn-cancel { background: #334155; color: #fff; }
        .btn-cancel:hover { background: #475569; }

        /* MÀN HÌNH NGỦ ĐÔNG */
        #sleepOverlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.95); z-index: 50; display: none;
            flex-direction: column; align-items: center; justify-content: center;
            backdrop-filter: blur(10px);
        }

        .btn-wake {
            background: var(--primary); color: #000; border: none; padding: 18px 35px;
            font-size: 1.2rem; font-family: 'Orbitron', sans-serif; font-weight: bold;
            border-radius: 40px; cursor: pointer; box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            transition: 0.3s; display: flex; align-items: center; gap: 10px;
        }
        .btn-wake:hover { transform: scale(1.05); box-shadow: 0 0 35px rgba(0, 242, 255, 0.8); }
        .icon-sleep { font-size: 3rem; margin-bottom: 15px; animation: float 3s ease-in-out infinite; }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
    </style>
</head>

<body>

    <header>
        <h3>Chấm công Bệnh viện Bệnh Nhiệt Đới</h3>
        <div id="resultBox" class="info status-scanning">
            <div class="loader"></div> ĐANG KHỞI TẠO CAMERA...
        </div>
        
        <div class="hold-meter">
            <div id="holdFill"></div>
        </div>
    </header>

    <div class="main-wrapper">
        <div id="sleepOverlay">
            <div class="icon-sleep">💤</div>
            <button class="btn-wake" onclick="wakeUp()">👋 CHẠM ĐỂ KHỞI ĐỘNG</button>
        </div>

        <div class="scan-bar"></div>
        <video id="webcam" autoplay playsinline></video>
        
        <div id="faceMask" class="face-mask"></div>
        
        <canvas id="cropCanvas" style="display:none;"></canvas>
    </div>

    <div class="history-container">
        <div class="history-title"><span style="color:var(--success)">●</span> Danh sách chấm công thành công</div>
        <ul class="history-list" id="historyList"></ul>

        <div id="debugBox" style="position: fixed; bottom: 20px; right: 20px; background: rgba(0,0,0,0.8); border: 2px solid var(--warning); padding: 10px; border-radius: 10px; z-index: 9999; text-align: center; display: none;">
            <p style="margin: 0 0 8px 0; font-size: 12px; font-weight: bold; color: var(--warning);">👁️ ẢNH CROP GỬI SERVER</p>
            <img id="debugImg" src="" style="width: 150px; height: 150px; object-fit: cover; border-radius: 8px; border: 1px solid #fff;" />
        </div>
    </div>

    <div class="popup-overlay" id="successPopup" onclick="closePopup()">
        <div class="popup-content" onclick="event.stopPropagation()">
            <button class="popup-close" onclick="closePopup()">✖</button>
            <div class="popup-icon">✅</div>
            <p class="popup-title">CHẤM CÔNG THÀNH CÔNG</p>
            <p class="popup-name" id="popupUserName">...</p>
        </div>
    </div>

    <div class="popup-overlay" id="renewPopup">
        <div class="popup-content popup-renew">
            <div class="popup-icon">🔄</div>
            <p class="popup-title" style="color: var(--primary); font-weight: bold;">CẬP NHẬT DIỆN MẠO</p>
            <p id="renewMessage" style="color: #cbd5e1; margin: 15px 0 25px 0; font-size: 1.1rem; line-height: 1.5;">
                ...
            </p>
            <div style="display: flex; gap: 15px; justify-content: center; margin-top: 10px;">
                <button class="btn-action btn-cancel" onclick="cancelRenew()">KHÔNG PHẢI TÔI</button>
                <button class="btn-action btn-confirm" onclick="submitRenew()">ĐÚNG LÀ TÔI</button>
            </div>
        </div>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const faceMask = document.getElementById('faceMask');
        const resultBox = document.getElementById('resultBox');
        const holdFill = document.getElementById('holdFill');
        const cropCanvas = document.getElementById('cropCanvas');
        const historyList = document.getElementById('historyList');

        let isProcessing = false;
        let lastDetection = null;
        let isFaceDetectionRunning = false;
        let currentPublicIp = '';
        let popupTimer = null;

        let sleepTimer = null;
        let isSleeping = false;
        const IDLE_TIMEOUT = 5 * 60 * 1000;

        let consecutiveGoodFrames = 0;
        let isLoopRunning = false;
        let emptyFrames = 0;
        let isFetchingAPI = false;
        let lastAttemptTime = 0;
        let isApiLocked = false;

        const USER_COOLDOWN_MS = 30 * 1000;
        const userCooldowns = {};
        
        // BIẾN LƯU TRỮ TẠM ẢNH ĐỂ CẬP NHẬT (RENEW)
        let pendingRenewData = null;

        // ---------------- THÔNG SỐ SIẾT CHẶT VÀ ÉP HOLD TIME ----------------
        const REQUIRED_GOOD_FRAMES = 15;  
        const SHARPNESS_THRESHOLD = 65;   
        const CENTER_X_MIN = 0.35; const CENTER_X_MAX = 0.65;
        const CENTER_Y_MIN = 0.35; const CENTER_Y_MAX = 0.65;
        const FACE_MIN_SIZE = 0.25; const FACE_MAX_SIZE = 0.55; 
        // ---------------------------------------------------------------------

        function isImageSharp(canvas, threshold = SHARPNESS_THRESHOLD) {
            try {
                const ctx = canvas.getContext('2d');
                const { width, height } = canvas;
                const imageData = ctx.getImageData(0, 0, width, height);
                const d = imageData.data;
                const gray = new Float32Array(width * height);
                for (let i = 0, j = 0; i < d.length; i += 4, j++) {
                    gray[j] = 0.299 * d[i] + 0.587 * d[i + 1] + 0.114 * d[i + 2];
                }
                let sum = 0, sumSq = 0, count = 0;
                for (let y = 1; y < height - 1; y++) {
                    for (let x = 1; x < width - 1; x++) {
                        const idx = y * width + x;
                        const lap = -gray[idx - 1] - gray[idx + 1]
                            - gray[idx - width] - gray[idx + width]
                            + 4 * gray[idx];
                        sum += lap; sumSq += lap * lap; count++;
                    }
                }
                const mean = sum / count;
                const variance = (sumSq / count) - (mean * mean);
                return variance > threshold;
            } catch (e) {
                return true;
            }
        }

        const faceDetection = new FaceDetection({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_detection/${file}`
        });

        faceDetection.setOptions({ model: 'full', minDetectionConfidence: 0.60 });

        faceDetection.onResults((results) => {
            isFaceDetectionRunning = false;

            if (isApiLocked) return;

            if (results.detections.length > 0) {
                resetSleepTimer();
                emptyFrames = 0;

                const detection = results.detections[0];
                lastDetection = detection.boundingBox;
                const landmarks = detection.landmarks;

                const faceSize = lastDetection.width;
                const faceX = lastDetection.xCenter;
                const faceY = lastDetection.yCenter;

                const isCentered = (faceX > CENTER_X_MIN && faceX < CENTER_X_MAX) && (faceY > CENTER_Y_MIN && faceY < CENTER_Y_MAX);

                let isStraight = true;
                let poseWarning = "";

                if (landmarks && landmarks.length >= 3) {
                    const eyeR = landmarks[0];
                    const eyeL = landmarks[1];
                    const nose = landmarks[2];

                    const eyeDistX = Math.abs(eyeL.x - eyeR.x);
                    const eyeDistY = Math.abs(eyeL.y - eyeR.y);

                    if (eyeDistY / eyeDistX > 0.15) {
                        isStraight = false;
                        poseWarning = `⚠️ VUI LÒNG GIỮ THẲNG ĐẦU`;
                    }
                    else {
                        const noseDistL = Math.abs(nose.x - eyeL.x);
                        const noseDistR = Math.abs(nose.x - eyeR.x);

                        if (Math.abs(noseDistL - noseDistR) / eyeDistX > 0.15) {
                            isStraight = false;
                            poseWarning = `⚠️ VUI LÒNG NHÌN THẲNG CAMERA`;
                        }
                    }
                }

                let isValid = true;
                let currentWarning = "";

                if (!isCentered) {
                    isValid = false;
                    currentWarning = `⚠️ VUI LÒNG ĐƯA MẶT VÀO GIỮA KHUNG HÌNH`;
                } else if (!isStraight) {
                    isValid = false;
                    currentWarning = poseWarning;
                } else if (faceSize < FACE_MIN_SIZE) {
                    isValid = false;
                    currentWarning = `⚠️ VUI LÒNG LẠI GẦN CAMERA HƠN`;
                } else if (faceSize > FACE_MAX_SIZE) {
                    isValid = false;
                    currentWarning = `⚠️ VUI LÒNG ĐỨNG XA RA CHÚT`;
                }

                if (!isValid) {
                    consecutiveGoodFrames = 0;
                    holdFill.style.width = "0%";
                    faceMask.classList.remove('active');
                    
                    if (!isProcessing) {
                        resultBox.className = "info status-warning";
                        resultBox.innerHTML = currentWarning;
                    }
                } else {
                    if (!isProcessing) {
                        faceMask.classList.add('active');
                        consecutiveGoodFrames = Math.min(consecutiveGoodFrames + 1, REQUIRED_GOOD_FRAMES);
                        const percent = (consecutiveGoodFrames / REQUIRED_GOOD_FRAMES) * 100;
                        holdFill.style.width = `${percent}%`;

                        if (consecutiveGoodFrames < REQUIRED_GOOD_FRAMES) {
                            resultBox.className = "info status-scanning";
                            resultBox.innerHTML = `📸 HÃY GIỮ YÊN TƯ THẾ NHÌN THẲNG...`;
                        } else {
                            resultBox.className = "info status-scanning";
                            resultBox.innerHTML = `✅ ĐANG LẤY ẢNH...`;
                            sendToAPI(); 
                        }
                    }
                }

            } else {
                emptyFrames++;
                if (emptyFrames > 15) {
                    consecutiveGoodFrames = 0;
                    holdFill.style.width = "0%";
                    faceMask.classList.remove('active');
                }

                lastDetection = null;
                consecutiveGoodFrames = 0;
                holdFill.style.width = "0%";
                faceMask.classList.remove('active');

                if (!isProcessing && !isSleeping) {
                    resultBox.className = "info status-scanning";
                    resultBox.innerHTML = "SẴN SÀNG QUÉT KHUÔN MẶT";
                }
            }
        });

        function resetSleepTimer() {
            if (sleepTimer) clearTimeout(sleepTimer);
            if (!isSleeping) {
                sleepTimer = setTimeout(enterSleepMode, IDLE_TIMEOUT);
            }
        }

        function enterSleepMode() {
            isSleeping = true;
            if (video.srcObject) {
                video.srcObject.getTracks().forEach(track => track.stop());
                video.srcObject = null;
            }
            document.getElementById('sleepOverlay').style.display = 'flex';
            document.getElementById('resultBox').className = "info status-sleep";
            document.getElementById('resultBox').innerHTML = "💤 HỆ THỐNG ĐANG TẠM NGHỈ";
            consecutiveGoodFrames = 0;
            holdFill.style.width = "0%";
            faceMask.classList.remove('active');
        }

        async function wakeUp() {
            isSleeping = false;
            document.getElementById('sleepOverlay').style.display = 'none';
            document.getElementById('resultBox').className = "info status-scanning";
            document.getElementById('resultBox').innerHTML = `<div class="loader"></div> ĐANG KHỞI ĐỘNG LẠI CAMERA...`;
            await startCamera();
            resetSleepTimer();
        }

        function captureCroppedFace() {
            if (!lastDetection) return null;

            const videoW = video.videoWidth;
            const videoH = video.videoHeight;
            let { xCenter, yCenter, width, height } = lastDetection;

            const padding = 0.25; 
            
            let cropW = width * (1 + padding) * videoW;
            let cropH = height * (1 + padding) * videoH;

            let startX = (xCenter * videoW) - (cropW / 2);
            let startY = (yCenter * videoH) - (cropH / 2);

            startX = Math.max(0, startX);
            startY = Math.max(0, startY);
            cropW = Math.min(videoW - startX, cropW);
            cropH = Math.min(videoH - startY, cropH);

            cropCanvas.width = 224;
            cropCanvas.height = 224;
            const ctx = cropCanvas.getContext('2d');

            ctx.translate(224, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, startX, startY, cropW, cropH, 0, 0, 224, 224);
            return cropCanvas.toDataURL('image/jpeg', 0.9);
        }

        function captureFullFrame() {
            const tempCanvas = document.createElement('canvas');
            const maxWidth = 640;
            const scale = Math.min(1, maxWidth / video.videoWidth);

            tempCanvas.width = video.videoWidth * scale;
            tempCanvas.height = video.videoHeight * scale;
            const ctx = tempCanvas.getContext('2d');

            ctx.translate(tempCanvas.width, 0);
            ctx.scale(-1, 1);
            ctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);

            return tempCanvas.toDataURL('image/jpeg', 0.6);
        }

        function addHistoryItem(userId, probability) {
            const timeString = new Date().toLocaleTimeString('vi-VN', { hour12: false, hour: '2-digit', minute: '2-digit', second: '2-digit' });
            const li = document.createElement('li');
            li.className = 'history-item';

            li.innerHTML = `
                <span class="history-time">${timeString}</span>
                <span class="history-name" title="${userId}">${userId.toUpperCase()}</span>
                <span class="history-prob">${probability}</span>
            `;

            historyList.prepend(li);
            if (historyList.children.length > 5) {
                historyList.removeChild(historyList.lastChild);
            }
        }

        function triggerSuccessPopup(name) {
            const popup = document.getElementById('successPopup');
            document.getElementById('popupUserName').innerText = name;
            popup.style.display = 'flex';

            if (popupTimer) clearTimeout(popupTimer);
            popupTimer = setTimeout(() => { closePopup(); }, 1500);
        }

        function closePopup() {
            document.getElementById('successPopup').style.display = 'none';
        }

        // ==========================================
        // KHỐI LOGIC XỬ LÝ RENEW (AUTO UPDATE FACE)
        // ==========================================
        async function submitRenew() {
            if (!pendingRenewData) return;
            
            document.getElementById('renewPopup').style.display = 'none';
            resultBox.className = "info status-scanning";
            resultBox.innerHTML = `<div class="loader"></div> ĐANG CẬP NHẬT DỮ LIỆU...`;

            try {
                const response = await fetch(`/api/confirm-renew`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(pendingRenewData)
                });
                const resData = await response.json();

                if (resData.status === "success") {
                    resultBox.className = "info status-ok";
                    resultBox.innerHTML = `✅ CẬP NHẬT & CHẤM CÔNG THÀNH CÔNG`;
                    triggerSuccessPopup(pendingRenewData.user_id);
                    addHistoryItem(pendingRenewData.user_id, "100% (Mới)");
                } else {
                    resultBox.className = "info status-err";
                    resultBox.innerHTML = `⚠️ LỖI CẬP NHẬT: ${resData.message}`;
                }
            } catch (e) {
                resultBox.className = "info status-err";
                resultBox.innerHTML = `⚠️ LỖI KẾT NỐI SERVER`;
            } finally {
                pendingRenewData = null;
                // Mở khóa camera sau khi xử lý xong
                setTimeout(() => {
                    isApiLocked = false;
                    isProcessing = false;
                    isFetchingAPI = false;
                    consecutiveGoodFrames = 0;
                    holdFill.style.width = "0%";
                    faceMask.classList.remove('active');
                }, 1500);
            }
        }

        function cancelRenew() {
            document.getElementById('renewPopup').style.display = 'none';
            pendingRenewData = null;
            
            resultBox.className = "info status-warning";
            resultBox.innerHTML = `⚠️ ĐÃ TỪ CHỐI CẬP NHẬT`;

            // Mở khóa camera ngay lập tức
            setTimeout(() => {
                isApiLocked = false;
                isProcessing = false;
                isFetchingAPI = false;
                consecutiveGoodFrames = 0;
                holdFill.style.width = "0%";
                faceMask.classList.remove('active');
            }, 800);
        }
        // ==========================================

        async function sendToAPI() {
            const now = Date.now();
            
            if (isFetchingAPI || isApiLocked) return;
            if (now - lastAttemptTime < 800) return;

            isFetchingAPI = true;
            isProcessing = true;
            lastAttemptTime = now;

            resultBox.className = "info status-scanning";
            resultBox.innerHTML = `<div class="loader"></div> ĐANG PHÂN TÍCH AI...`;

            const controller = new AbortController();
            const timeoutId = setTimeout(() => controller.abort(), 10000);

            let isRenewFlow = false; // Cờ theo dõi xem có dính vào luồng renew không

            try {
                const tempCanvas = document.createElement('canvas');
                const maxWidth = 640;
                const scale = Math.min(1, maxWidth / video.videoWidth);
                tempCanvas.width = video.videoWidth * scale;
                tempCanvas.height = video.videoHeight * scale;
                const ctx = tempCanvas.getContext('2d');
                ctx.translate(tempCanvas.width, 0);
                ctx.scale(-1, 1);
                ctx.drawImage(video, 0, 0, tempCanvas.width, tempCanvas.height);

                if (!isImageSharp(tempCanvas, SHARPNESS_THRESHOLD)) {
                    resultBox.className = "info status-warning";
                    resultBox.innerHTML = `⚠️ ẢNH BỊ RUNG MỜ, VUI LÒNG ĐỨNG YÊN TƯ THẾ`;
                    
                    consecutiveGoodFrames = 0;
                    holdFill.style.width = "0%";
                    faceMask.classList.remove('active');
                    
                    setTimeout(() => { isApiLocked = false; isProcessing = false; isFetchingAPI = false; }, 800); 
                    clearTimeout(timeoutId);
                    return; 
                }

                const croppedImage = captureCroppedFace();
                const fullImage = captureFullFrame(); 

                if (!croppedImage || !fullImage) throw new Error("Không capture được ảnh");

                document.getElementById('debugBox').style.display = 'block';
                document.getElementById('debugImg').src = croppedImage;
            
                const response = await fetch(`/recognize`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        image_base64: croppedImage,
                        full_image_base64: fullImage,
                        client_public_ip: currentPublicIp,
                        attendance_type: 'Tập trung v3'
                    }),
                    signal: controller.signal
                });

                clearTimeout(timeoutId);
                const data = await response.json();

                if (data.recognized === true) {
                    const checkTime = Date.now();
                    if (userCooldowns[data.user_id] && checkTime - userCooldowns[data.user_id] < USER_COOLDOWN_MS) {
                        resultBox.className = "info status-ok";
                        resultBox.innerHTML = `✅ ${data.user_id.toUpperCase()} ĐÃ CHẤM CÔNG`;
                    } else {
                        userCooldowns[data.user_id] = checkTime;
                        resultBox.className = "info status-ok";
                        resultBox.innerHTML = `✅ XIN CHÀO: ${data.user_id.toUpperCase()}`;
                        addHistoryItem(data.user_id, data.match_probability);
                        triggerSuccessPopup(data.user_id.toUpperCase());
                    }
                } 
                // XỬ LÝ TÍN HIỆU RENEW TỪ BACKEND
                else if (data.recognized === "verify_renew") {
                    isRenewFlow = true; 
                    isApiLocked = true; // Khóa chặt camera lại
                    
                    // Gói ghém dữ liệu chờ gửi đi
                    pendingRenewData = {
                        user_id: data.user_id,
                        image_base64: croppedImage,
                        full_image_base64: fullImage,
                        client_public_ip: currentPublicIp,
                        attendance_type: 'Tập trung v3'
                    };

                    document.getElementById('renewMessage').innerHTML = `Hệ thống nhận diện bạn là:<br><b style="font-size: 1.4rem; color: #fff;">${data.user_id.toUpperCase()}</b><br><br>Nhưng diện mạo của bạn có vẻ đã thay đổi.<br>Bạn có muốn lưu khuôn mặt này làm mặc định không?`;
                    document.getElementById('renewPopup').style.display = 'flex';
                }
                else {
                    resultBox.className = "info status-warning";
                    resultBox.innerHTML = `⚠️ KHÔNG NHẬN DIỆN ĐƯỢC - ĐANG THỬ LẠI...`;
                }

            } catch (e) {
                clearTimeout(timeoutId);
                console.error("Lỗi API:", e);
                resultBox.className = "info status-err";
                if (e.name === 'AbortError') {
                    resultBox.innerHTML = `⚠️ MÁY CHỦ PHẢN HỒI QUÁ LÂU - ĐANG THỬ LẠI...`;
                } else {
                    resultBox.innerHTML = `⚠️ LỖI KẾT NỐI - ĐANG THỬ LẠI...`;
                }
            } finally {
                // Nếu đang dính vào luồng Renew (hiện popup) thì TUYỆT ĐỐI KHÔNG mở khóa camera ở đây.
                // Việc mở khóa sẽ do 2 nút bấm Submit/Cancel quyết định.
                if (!isRenewFlow) {
                    setTimeout(() => {
                        isApiLocked = false;
                        isProcessing = false;
                        isFetchingAPI = false;
                        consecutiveGoodFrames = 0;
                        holdFill.style.width = "0%";
                        faceMask.classList.remove('active');
                    }, 1000); 
                }
            }
        }

        async function processVideoFrame() {
            if (!isSleeping && video.readyState >= 2 && !isFaceDetectionRunning) {
                isFaceDetectionRunning = true;
                try {
                    await faceDetection.send({ image: video });
                } catch (err) {
                    console.error("🔥 LỖI MEDIAPIPE - Đang tải lại AI...", err);
                    window.location.reload(true);
                    return;
                }
            }
            requestAnimationFrame(processVideoFrame);
        }

        async function startCamera() {
            verifyNetwork();
            try {
                document.getElementById('resultBox').innerHTML = `<div class="loader"></div> ĐANG TẢI MÔ HÌNH AI...`;
                await faceDetection.initialize();
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { facingMode: "user", width: { ideal: 640 }, height: { ideal: 480 } }
                });
                video.srcObject = stream;
                video.onloadedmetadata = () => {
                    if (!isLoopRunning) {
                        isLoopRunning = true;
                        processVideoFrame();
                    }
                }
            } catch (err) {
                resultBox.className = "info status-err";
                resultBox.innerHTML = "❌ LỖI TRUY CẬP CAMERA";
            }
        }

        async function verifyNetwork() {
            try {
                const ipRes = await fetch('https://api.ipify.org?format=json');
                const ipData = await ipRes.json();
                currentPublicIp = ipData.ip;
            } catch (e) {}
        }

        function schedulePeriodicReload() {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();

            let targetTime = new Date(now.getTime());
            targetTime.setSeconds(0);
            targetTime.setMilliseconds(0);

            const isMorningWindow = currentHour >= 6 && currentHour < 8;
            const isAfternoonWindow = currentHour >= 16 && currentHour < 18;

            if (isMorningWindow || isAfternoonWindow) {
                const next10MinMark = Math.ceil((currentMinute + 1) / 10) * 10;
                if (next10MinMark === 60) {
                    targetTime.setHours(currentHour + 1);
                    targetTime.setMinutes(0);
                } else {
                    targetTime.setMinutes(next10MinMark);
                }
            }
            else if (currentHour < 6) {
                targetTime.setHours(6, 0, 0, 0);
            }
            else if (currentHour >= 8 && currentHour < 16) {
                targetTime.setHours(16, 0, 0, 0);
            }
            else {
                targetTime.setDate(targetTime.getDate() + 1);
                targetTime.setHours(6, 0, 0, 0);
            }

            const msUntilReload = targetTime.getTime() - now.getTime();
            setTimeout(() => window.location.reload(true), msUntilReload);
        }

        startCamera();
        resetSleepTimer();
        schedulePeriodicReload();
    </script>
</body>
