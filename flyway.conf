# flyway.conf

# URL kết nối đến MySQL (Đảm bảo đã tạo database bnd_face_recog trước)
flyway.url=jdbc:mysql://localhost:3306/bnd_face_recog?allowPublicKeyRetrieval=true&useSSL=false

# User và Password của MySQL
flyway.user=root
flyway.password=123456

# Thư mục chứa các file SQL (V1, V2...)
flyway.locations=filesystem:./sql_migrations

# Tùy chọn: Cho phép Flyway tự tạo bảng quản lý nếu chưa có
flyway.baselineOnMigrate=true